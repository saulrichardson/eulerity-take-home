spring.application.name=task-manager
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:h2:mem:taskmanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.4-nano}
openai.model-context-window-tokens=${OPENAI_MODEL_CONTEXT_WINDOW_TOKENS:400000}
openai.context-usage-ratio=${OPENAI_CONTEXT_USAGE_RATIO:0.90}
openai.suggestion-max-output-tokens=${OPENAI_SUGGESTION_MAX_OUTPUT_TOKENS:2048}
openai.summary-max-output-tokens=${OPENAI_SUMMARY_MAX_OUTPUT_TOKENS:1024}
openai.request-overhead-reserve-tokens=${OPENAI_REQUEST_OVERHEAD_RESERVE_TOKENS:1000}

ai.summary.application-input-token-budget=${AI_SUMMARY_INPUT_TOKEN_BUDGET:6000}
ai.summary.candidate-task-cap=${AI_SUMMARY_CANDIDATE_TASK_CAP:30}
ai.summary.per-task-description-prompt-budget=${AI_SUMMARY_PER_TASK_DESCRIPTION_PROMPT_BUDGET:1200}
ai.summary.max-summary-length=${AI_SUMMARY_MAX_SUMMARY_LENGTH:1200}
ai.summary.max-plan-items=${AI_SUMMARY_MAX_PLAN_ITEMS:5}
ai.summary.max-plan-item-length=${AI_SUMMARY_MAX_PLAN_ITEM_LENGTH:300}
