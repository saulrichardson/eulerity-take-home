<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Eulerity Task Manager</title>
	<link rel="icon" href="data:,">
	<link rel="stylesheet" href="/styles.css">
</head>
<body>
	<div class="app-shell">
		<header class="app-header">
			<div>
				<p class="eyebrow">Eulerity Take-Home</p>
				<h1>Task Manager</h1>
			</div>
			<div class="header-status">
				<span class="task-count-pill" id="taskCount">0 tasks</span>
				<span class="status-line" id="statusLine">Loading tasks...</span>
			</div>
		</header>

		<main class="dashboard">
			<section class="task-board" aria-labelledby="taskListTitle">
				<div class="board-header">
					<div>
						<h2 id="taskListTitle">Work Queue</h2>
					</div>
					<div class="task-controls" aria-label="Task list controls">
						<label>
							Status
							<select id="statusFilter" name="statusFilter">
								<option value="">All statuses</option>
								<option value="TODO">TODO</option>
								<option value="IN_PROGRESS">IN_PROGRESS</option>
								<option value="DONE">DONE</option>
							</select>
						</label>
						<label>
							Priority
							<select id="priorityFilter" name="priorityFilter">
								<option value="">All priorities</option>
								<option value="LOW">LOW</option>
								<option value="MEDIUM">MEDIUM</option>
								<option value="HIGH">HIGH</option>
							</select>
						</label>
						<label>
							Sort
							<select id="taskSort" name="taskSort">
								<option value="id">Created order</option>
								<option value="dueDate">Due date</option>
								<option value="priority">Priority</option>
							</select>
						</label>
					</div>
				</div>
				<div id="taskList" class="task-list"></div>
			</section>

			<aside class="workspace-panel" aria-label="Task tools">
				<section class="tool-panel" aria-labelledby="createTitle">
					<div class="panel-heading">
						<h2 id="createTitle">New Task</h2>
					</div>
					<form id="taskForm" class="task-form">
						<label>
							Title
							<input id="title" name="title" required maxlength="255" autocomplete="off">
						</label>
						<label>
							Description
							<textarea id="description" name="description" maxlength="8000"></textarea>
						</label>
						<div class="form-grid">
							<label>
								Due Date
								<input id="dueDate" name="dueDate" type="date" required>
							</label>
							<label>
								Priority
								<select id="priority" name="priority" required>
									<option value="LOW">LOW</option>
									<option value="MEDIUM" selected>MEDIUM</option>
									<option value="HIGH">HIGH</option>
								</select>
							</label>
						</div>
						<label>
							Status
							<select id="status" name="status" required>
								<option value="TODO" selected>TODO</option>
								<option value="IN_PROGRESS">IN_PROGRESS</option>
								<option value="DONE">DONE</option>
							</select>
						</label>
						<div class="actions">
							<button type="submit" id="taskSubmitButton">Create Task</button>
							<button class="secondary" type="button" id="resetForm">Reset</button>
						</div>
					</form>
					<div id="formMessage" aria-live="polite"></div>
				</section>

				<section class="tool-panel" aria-labelledby="suggestTitle">
					<div class="panel-heading">
						<h2 id="suggestTitle">AI Draft</h2>
					</div>
					<form id="suggestForm" class="task-form">
						<label>
							Task Intent
							<textarea id="suggestDescription" name="suggestDescription" required maxlength="12000">remind me to submit the quarterly report before Friday</textarea>
						</label>
						<div class="actions">
							<button type="submit" id="suggestButton">Suggest Task</button>
							<button class="secondary" type="button" id="clearSuggestion">Clear</button>
						</div>
					</form>
					<div id="suggestionOutput" aria-live="polite"></div>
				</section>

				<section class="tool-panel" aria-labelledby="summaryTitle">
					<div class="panel-heading">
						<h2 id="summaryTitle">Focus Plan</h2>
					</div>
					<div class="actions">
						<button type="button" id="summaryButton">Summarize Tasks</button>
					</div>
					<div id="summaryOutput" aria-live="polite"></div>
				</section>
			</aside>
		</main>
	</div>

	<script type="module" src="/app.js"></script>
</body>
</html>
