spring.application.name=task-manager-test
spring.config.import=

spring.datasource.url=jdbc:h2:mem:taskmanager-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

openai.api-key=
openai.model=gpt-5.4-nano
openai.model-context-window-tokens=400000
openai.context-usage-ratio=0.90
openai.suggestion-max-output-tokens=2048
openai.summary-max-output-tokens=1024
openai.request-overhead-reserve-tokens=1000

ai.summary.application-input-token-budget=6000
ai.summary.candidate-task-cap=30
ai.summary.per-task-description-prompt-budget=1200
ai.summary.max-summary-length=1200
ai.summary.max-plan-items=5
ai.summary.max-plan-item-length=300
